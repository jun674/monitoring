<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Pop Mockup Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        iframe { border: none; width: 100%; height: 100%; }
        /* 가로 스크롤바 숨기기 (버튼이 많아질 경우 대비) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-100 text-slate-800">

    <header class="bg-white border-b border-slate-200 shadow-lg z-10 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <div class="shrink-0">
                <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                    <span class="text-indigo-500">❖</span> Mockup Viewer
                </h1>
                <p class="text-[10px] text-slate-500">Select a design to preview</p>
            </div>

            <nav class="flex items-center gap-2 overflow-x-auto no-scrollbar" id="file-list">
                </nav>
        </div>

        <div class="shrink-0">
            <button onclick="reloadFrame()" class="py-2 px-4 rounded-lg text-sm font-medium bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors flex items-center gap-2">
                <span>↻</span> Refresh
            </button>
        </div>
    </header>

    <main class="flex-1 bg-slate-50 relative">
        <iframe id="preview-frame" src="" class="absolute inset-0 w-full h-full"></iframe>
    </main>

    <script>
        const files = [
            { name: 'Mockup 1', file: 'mockUp1.html' },
            { name: 'Mockup 2', file: 'mockUp2.html' },
            { name: 'Mockup 3', file: 'mockUp3.html' },
            { name: 'Mockup 4', file: 'mockUp4.html' },            
        ];

        const listContainer = document.getElementById('file-list');
        const iframe = document.getElementById('preview-frame');

        // 초기 실행
        function init() {
            files.forEach((item, index) => {
                const btn = document.createElement('button');
                // 가로형 탭 스타일로 클래스 수정
                btn.className = `px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex flex-col items-center shrink-0
                    ${index === 0 ? 'bg-indigo-500 text-white shadow-md shadow-indigo-500/30' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`;
                
                btn.innerHTML = `
                    <span>${item.name}</span>
                    <span class="text-[9px] opacity-60 font-mono">${item.file}</span>
                `;
                
                btn.onclick = () => loadFile(item, btn);
                listContainer.appendChild(btn);

                // 첫 번째 파일 자동 로드
                if (index === 0) loadFile(item, btn);
            });
        }

        // 파일 로드 함수
        function loadFile(item, clickedBtn) {
            iframe.src = item.file;

            // 버튼 스타일 업데이트 (가로형 탭 상태 업데이트)
            const allBtns = listContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex flex-col items-center shrink-0 text-slate-600 hover:bg-slate-100 hover:text-slate-900';
            });
            clickedBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex flex-col items-center shrink-0 bg-indigo-500 text-white shadow-md shadow-indigo-500/30 ring-1 ring-indigo-400';
        }

        // 새로고침 기능
        function reloadFrame() {
            iframe.src = iframe.src;
        }

        init();
    </script>
</body>
</html>
