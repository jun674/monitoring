<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="popup.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', sans-serif;
            background-color: #F5F6F8; /* 아주 연한 웜그레이 톤 */
            color: #191F28;
        }
        .font-tech { font-family: 'Rajdhani', sans-serif; }

        /* 스크롤바 숨김 (깔끔함 유지) */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Soft Card Design */
        .soft-card {
            background: #FFFFFF;
            border-radius: 24px; /* 더 둥근 모서리 */
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); /* 아주 부드러운 그림자 */
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            position: relative;
        }
        
        .soft-card:hover {
            transform: translateY(-8px);
        }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 28px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .ai-badge {
            width: 28px; height: 28px; border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .topbar-title { font-size: 15px; font-weight: 600; color: #191F28; }
        .topbar-tabs {
            display: flex; gap: 2px;
            background: #f3f4f6;
            border-radius: 24px;
            padding: 3px;
        }
        .tab-btn {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #8b95a1;
            transition: all 0.15s;
            font-family: 'Pretendard', sans-serif;
        }
        .tab-btn:hover { background: #f3f4f6; color: #333D4B; }
        .tab-btn.active { background: #191F28; color: #fff; }

        /* Badge Styles */
        .badge-soft {
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* KPI Mini Progress Bar */
        .kpi-mini-bar {
            height: 6px;
            border-radius: 3px;
            background: #F2F4F6;
            overflow: hidden;
            position: relative;
        }
        .kpi-mini-bar .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .kpi-mini-bar .fill.achieved    { background: linear-gradient(90deg, #34D399, #10B981); }
        .kpi-mini-bar .fill.in-progress { background: linear-gradient(90deg, #FCD34D, #F59E0B); }
        .kpi-mini-bar .fill.not-started { background: #D1D5DB; }

        /* Category Badge */
        .badge-category {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 0.3px;
        }
        .badge-category.lead    { background: #FEF3C7; color: #92400E; }
        .badge-category.partner { background: #EFF6FF; color: #1E40AF; }

        /* Animations */
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .card-highlight {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 3px rgba(59, 130, 246, 0.7);
            transform: translateY(-8px);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="topbar">
        <div class="topbar-left">
            <div class="ai-badge">AI</div>
            <span class="topbar-title">Partners</span>
        </div>
        <div class="topbar-tabs">
            <button class="tab-btn active" onclick="filterCards('ALL')">ALL</button>
            <button class="tab-btn" onclick="filterCards('DATA')">Data</button>
            <button class="tab-btn" onclick="filterCards('AI')">AI</button>
            <button class="tab-btn" onclick="filterCards('INFRA')">Infra</button>
            <button class="tab-btn" onclick="filterCards('NETWORK')">Network</button>
            <button class="tab-btn" onclick="filterCards('ORG')">Org</button>
            <button class="tab-btn" onclick="filterCards('SERVICE')">Service</button>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto p-8 lg:p-12 relative">
        <div class="max-w-[1600px] mx-auto pb-20 relative z-10">
            
            <div class="flex items-end justify-between mb-8 px-1">
                 <div id="company-list" class="flex-1 flex flex-wrap gap-2"></div>
                 <div class="flex flex-col items-end">
                    <span class="text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Total Services</span>
                    <div class="font-tech flex items-baseline gap-2">
                        <span id="count-display" class="text-4xl font-bold text-gray-900">15</span>
                        <span class="text-lg text-gray-400 font-medium">ACTIVE</span>
                    </div>
                </div>
            </div>

            <div id="card-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
        </div>
    </main>

        <script src="data.js"></script>
    <script>
        // Soft Minimal Color Scheme (파스텔 톤 뱃지)
        const typeStyles = {
            'DATA': { bg: 'bg-blue-50', text: 'text-blue-600', icon: 'text-blue-500' },
            'AI': { bg: 'bg-purple-50', text: 'text-purple-600', icon: 'text-purple-500' },
            'INFRA': { bg: 'bg-gray-100', text: 'text-gray-600', icon: 'text-gray-500' },
            'NETWORK': { bg: 'bg-emerald-50', text: 'text-emerald-600', icon: 'text-emerald-500' },
            'ORG': { bg: 'bg-orange-50', text: 'text-orange-600', icon: 'text-orange-500' },
            'SERVICE': { bg: 'bg-rose-50', text: 'text-rose-600', icon: 'text-rose-500' }
        };

        function filterCards(filterType) {
            const grid = document.getElementById('card-grid');
            const listBar = document.getElementById('company-list');
            const countDisplay = document.getElementById('count-display');
            
            const filtered = filterType === 'ALL' ? companies : companies.filter(c => c.type === filterType);
            
            countDisplay.innerText = filtered.length;

            // Tab Button State
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const btnType = btn.innerText.toUpperCase();
                if (btnType === filterType) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Top Chip List
            listBar.innerHTML = '';
            filtered.forEach(item => {
                const style = typeStyles[item.type];
                const chip = document.createElement('div');
                chip.className = `px-3 py-1.5 rounded-lg text-xs font-semibold bg-white border border-gray-100 text-gray-600 flex items-center gap-2 shadow-sm cursor-pointer hover:bg-gray-50 transition-colors`;
                chip.innerHTML = `<i class="${item.icon} ${style.icon}"></i> ${item.name}`;
                chip.onclick = () => scrollToCard(item.id);
                listBar.appendChild(chip);
            });

            // Card Grid Render
            grid.innerHTML = '';
            filtered.forEach((item, index) => {
                const style = typeStyles[item.type];
                const companyIndex = companies.findIndex(c => c.id === item.id);

                // 대표 KPI 계산 (첫 번째 숫자형 achievement)
                const primaryKpi = item.results.kpis.find(k => typeof k.achievement === 'number');
                const avgAchievement = item.results.kpis.filter(k => typeof k.achievement === 'number');
                const avgVal = avgAchievement.length > 0
                    ? Math.round(avgAchievement.reduce((s, k) => s + k.achievement, 0) / avgAchievement.length)
                    : 0;
                const kpiStatus = avgVal >= 100 ? 'achieved' : avgVal > 0 ? 'in-progress' : 'not-started';
                const categoryBadge = item.category === '주관'
                    ? '<span class="badge-category lead">주관</span>'
                    : '<span class="badge-category partner">참여</span>';
                
                const card = document.createElement('div');
                card.id = `card-${item.id}`;
                card.className = "animate-enter";
                card.style.animationDelay = `${index * 0.05}s`;
                card.onclick = () => showCompanyPopup(companies[companyIndex]);
                card.innerHTML = `
                    <div class="soft-card h-full cursor-pointer flex flex-col p-7 group">
                        <div class="flex justify-between items-start mb-5">
                            <div class="w-11 h-11 rounded-2xl ${style.bg} flex items-center justify-center transition-transform group-hover:scale-110 duration-300">
                                <i class="${item.icon} ${style.icon} text-lg"></i>
                            </div>
                            <div class="flex items-center gap-1.5">
                                ${categoryBadge}
                                <span class="badge-soft ${style.bg} ${style.text}">${item.type}</span>
                            </div>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 mb-1 group-hover:text-blue-600 transition-colors">${item.name}</h3>
                        <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">${item.role}</p>
                        <p class="text-[13px] text-gray-500 leading-relaxed line-clamp-2 mb-4">${item.results.title}</p>

                        <div class="mt-auto pt-5 border-t border-gray-50 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="text-[11px] font-bold text-gray-400 group-hover:text-gray-900 transition-colors">상세보기</span>
                                <span class="text-[10px] text-gray-300">${item.results.deliverables.length}건 산출물</span>
                            </div>
                            <div class="w-7 h-7 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-black group-hover:text-white transition-all">
                                <i class="fas fa-arrow-right text-[10px] transform -rotate-45 group-hover:rotate-0 transition-transform"></i>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function scrollToCard(companyId) {
            const card = document.getElementById(`card-${companyId}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.classList.add('card-highlight');
                setTimeout(() => {
                    card.classList.remove('card-highlight');
                }, 2000);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            filterCards('ALL');
        });
    </script>
</body>
</html>
